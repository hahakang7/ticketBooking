version: '3.9'

services:
  # WebSocket Service
  websocket-service:
    build:
      context: ./apps/websocket-service
      dockerfile: Dockerfile
    container_name: ticket_websocket
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      CORS_ORIGIN: http://localhost:3001
      API_BASE_URL: http://core-api:8000
      LOG_LEVEL: info
      JWT_SECRET: dev-secret-key-ticket-booking-2026
      INTERNAL_SECRET: dev-internal-secret-2026
    depends_on:
      - redis
    networks:
      - distribute-sys-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: ticket_frontend
    ports:
      - "3001:3001"
    depends_on:
      - websocket-service
    networks:
      - distribute-sys-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 10s
      timeout: 3s
      retries: 3
