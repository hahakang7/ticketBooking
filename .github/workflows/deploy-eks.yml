name: Deploy to EKS

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'infra/k8s/**'
      - '.github/workflows/deploy-eks.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: '배포할 이미지 태그 (기본: 커밋 SHA)'
        required: false
        default: ''
      skip_build:
        description: '이미지 빌드 건너뛰기 (infra 변경만 배포할 때)'
        type: boolean
        default: false

env:
  AWS_REGION: ap-northeast-2
  CLUSTER_NAME: ticket-booking
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  # ── ECR 이미지 빌드 & 푸시 ─────────────────────────────────────
  build-and-push:
    if: ${{ github.event.inputs.skip_build != 'true' }}
    runs-on: ubuntu-latest
    name: Build & Push Docker Images
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push core-api
        uses: docker/build-push-action@v5
        with:
          context: ./apps/core-api
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/core-api:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/core-api:latest
          cache-from: type=gha,scope=core-api
          cache-to: type=gha,mode=max,scope=core-api

      - name: Build & Push websocket-service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/websocket-service
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/websocket-service:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/websocket-service:latest
          cache-from: type=gha,scope=websocket-service
          cache-to: type=gha,mode=max,scope=websocket-service

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/frontend:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── EKS 배포 ──────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to EKS
    needs: [build-and-push]
    if: always() && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          fi
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Apply namespace & shared resources
        run: |
          kubectl apply -f infra/k8s/namespace/namespace.yaml
          kubectl apply -f infra/k8s/base/shared/ -n ticket-system

      - name: Apply Karpenter resources
        run: |
          kubectl apply -f infra/k8s/autoscaling/karpenter-nodeclass.yaml
          kubectl apply -f infra/k8s/autoscaling/karpenter-nodepool.yaml

      - name: Deploy core-api
        run: |
          kubectl apply -f infra/k8s/base/core-api/ -n ticket-system
          kubectl set image deployment/core-api \
            core-api=${{ env.ECR_REGISTRY }}/core-api:${{ steps.tag.outputs.image_tag }} \
            -n ticket-system

      - name: Deploy websocket-service
        run: |
          kubectl apply -f infra/k8s/base/websocket-service/ -n ticket-system
          kubectl set image deployment/websocket-service \
            websocket=${{ env.ECR_REGISTRY }}/websocket-service:${{ steps.tag.outputs.image_tag }} \
            -n ticket-system

      - name: Deploy frontend
        run: |
          kubectl apply -f infra/k8s/base/frontend/ -n ticket-system
          kubectl set image deployment/frontend \
            frontend=${{ env.ECR_REGISTRY }}/frontend:${{ steps.tag.outputs.image_tag }} \
            -n ticket-system

      - name: Apply HPA
        run: |
          kubectl apply -f infra/k8s/autoscaling/core-api-hpa.yaml -n ticket-system
          kubectl apply -f infra/k8s/autoscaling/websocket-hpa.yaml -n ticket-system

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/core-api -n ticket-system --timeout=5m
          kubectl rollout status deployment/websocket-service -n ticket-system --timeout=5m
          kubectl rollout status deployment/frontend -n ticket-system --timeout=5m

      - name: Verify deployment
        run: |
          echo "=== Nodes ==="
          kubectl get nodes
          echo ""
          echo "=== Pods (ticket-system) ==="
          kubectl get pods -n ticket-system
          echo ""
          echo "=== NodePools ==="
          kubectl get nodepools
