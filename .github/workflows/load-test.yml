name: Load Test

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: '실행할 테스트'
        required: true
        default: 'queue'
        type: choice
        options:
          - queue
          - reservation
          - websocket
          - all
      vus:
        description: '가상 사용자 수 (Virtual Users)'
        required: false
        default: '50'
      duration:
        description: '테스트 시간 (예: 30s, 1m, 5m)'
        required: false
        default: '1m'

  # develop 브랜치 push 시 가벼운 스모크 테스트 자동 실행
  push:
    branches: [develop]
    paths:
      - 'tests/k6/**'
      - 'apps/core-api/**'

jobs:
  load-test:
    runs-on: ubuntu-latest
    name: Run k6 Load Test

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Start services with Docker Compose
        # docker-compose.yml이 include: 로 api/gateway 파일을 포함하므로 단일 명령 사용
        run: |
          docker compose up -d postgres redis
          sleep 10
          docker compose up -d core-api
          sleep 5

      - name: Wait for Core API health
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost:8000/health; then
              echo "Core API is ready!"
              break
            fi
            echo "Waiting... ($i/20)"
            sleep 3
          done

      - name: Create results directory
        run: mkdir -p results

      - name: Run Queue Load Test
        if: github.event.inputs.test_type == 'queue' || github.event.inputs.test_type == 'all' || github.event_name == 'push'
        run: |
          VUS="${{ github.event.inputs.vus || '10' }}"
          DURATION="${{ github.event.inputs.duration || '30s' }}"
          k6 run \
            --vus "$VUS" \
            --duration "$DURATION" \
            --out json=results/queue-test-result.json \
            tests/k6/queue-load-test.js || true
        env:
          BASE_URL: http://localhost:8000

      - name: Run Reservation Stress Test
        if: github.event.inputs.test_type == 'reservation' || github.event.inputs.test_type == 'all'
        run: |
          VUS="${{ github.event.inputs.vus || '50' }}"
          DURATION="${{ github.event.inputs.duration || '1m' }}"
          k6 run \
            --vus "$VUS" \
            --duration "$DURATION" \
            --out json=results/reservation-test-result.json \
            tests/k6/reservation-stress-test.js || true
        env:
          BASE_URL: http://localhost:8000

      - name: Run WebSocket Load Test
        if: github.event.inputs.test_type == 'websocket' || github.event.inputs.test_type == 'all'
        run: |
          VUS="${{ github.event.inputs.vus || '100' }}"
          DURATION="${{ github.event.inputs.duration || '1m' }}"
          k6 run \
            --vus "$VUS" \
            --duration "$DURATION" \
            --out json=results/websocket-test-result.json \
            tests/k6/websocket-load-test.js || true
        env:
          WS_URL: ws://localhost:3000
          HTTP_URL: http://localhost:3000
          EVENT_ID: ${{ github.event.inputs.event_id || 'evt-default' }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results-${{ github.run_number }}
          path: results/
          retention-days: 30

      - name: Stop services
        if: always()
        run: docker compose down