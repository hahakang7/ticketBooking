apiVersion: v1
kind: ConfigMap
metadata:
  name: prediction-service-config
  namespace: ticket-system
data:
  forecast_window_minutes: "30"
  log_level: "INFO"
  peak_time: "19:00"
  prometheus_url: "http://prometheus:9090"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prediction-service
  namespace: ticket-system
  labels:
    app: prediction-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prediction-service
  template:
    metadata:
      labels:
        app: prediction-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: prediction-service
        image: prediction-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8001
        envFrom:
        - configMapRef:
            name: prediction-service-config
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            cpu: "500m"
            memory: "256Mi"
          limits:
            cpu: "2"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 2
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
---
apiVersion: v1
kind: Service
metadata:
  name: prediction-service
  namespace: ticket-system
  labels:
    app: prediction-service
spec:
  type: ClusterIP
  selector:
    app: prediction-service
  ports:
  - name: http
    port: 8001
    targetPort: 8001
