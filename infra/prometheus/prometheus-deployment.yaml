apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring # ConfigMap과 동일한 네임스페이스여야 합니다.
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.45.0 # 안정적인 LTS 버전 사용 추천
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
              name: web
          volumeMounts:
            # ✅ ConfigMap을 컨테이너 내부의 /etc/prometheus 폴더로 마운트합니다.
            - name: config-volume
              mountPath: /etc/prometheus
            - name: storage-volume
              mountPath: /prometheus
      volumes:
        # ✅ 방금 만든 prometheus-config ConfigMap을 연결합니다.
        - name: config-volume
          configMap:
            name: prometheus-config
        # 로컬 테스트용 임시 볼륨 (운영 환경에서는 AWS EBS 등 PersistentVolume 권장)
        - name: storage-volume
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: monitoring
spec:
  type: NodePort # 로컬 도커 환경이나 브라우저에서 편하게 접속하기 위해 NodePort 설정
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090 # 브라우저에서 localhost:30090 으로 접속 가능
      protocol: TCP
  selector:
    app: prometheus