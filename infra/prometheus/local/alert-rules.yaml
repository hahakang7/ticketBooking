groups:
  - name: flash-crowd
    interval: 5s
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[1m]) / rate(http_requests_total[1m]) > 0.05
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "에러율 5% 초과"

      - alert: HighP95Latency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[1m])) > 0.3
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "P95 응답시간 300ms 초과"

      - alert: WebSocketConnectionDrop
        expr: delta(socket_io_connections_active[1m]) < -50
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "WebSocket 연결 1분 내 50개 이상 급감"
