apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
data:
  DEBUG: "false"
  LOG_LEVEL: "info"
  DATABASE_URL: "postgresql://user:password@postgres:5432/booking_system"
  REDIS_URL: "redis://redis:6379"
  WEBSOCKET_ORIGIN: "http://localhost:3001"
  WEBSOCKET_HEARTBEAT: "25000"
  WEBSOCKET_TIMEOUT: "60000"