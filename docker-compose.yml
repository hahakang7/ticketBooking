version: '3.8'

include:
  - docker-compose.api.yml
  - docker-compose.gateway.yml

services:
  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:15-alpine
    container_name: distribute-sys-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: booking_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d booking_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - distribute-sys-network

  # Redis 캐시 및 메시지 브로커
  redis:
    image: redis:7-alpine
    container_name: distribute-sys-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - distribute-sys-network

  # Prometheus (모니터링) - 선택사항
  prometheus:
    image: prom/prometheus:latest
    container_name: distribute-sys-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - distribute-sys-network
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  prometheus_data:

networks:
  distribute-sys-network:
    driver: bridge
