apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-scripts
  namespace: ticket-system
data:
  reservation-stress-test.js: |
    # 실제 파일은 kubectl create configmap으로 주입 (아래 실행 가이드 참고)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-reservation-stress
  namespace: ticket-system
  labels:
    app: k6-load-test
    test: reservation-stress
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      affinity:
        # 앱 파드와 동일 AZ에 배치 → Cross-AZ 전송 비용 $0
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: core-api
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: k6
          image: grafana/k6:latest
          args:
            - run
            - --vus
            - "50"
            - --duration
            - "120s"
            - -e
            - BASE_URL=http://core-api:8000   # 클러스터 내부 DNS → 이그레스 비용 $0
            - /scripts/reservation-stress-test.js
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: scripts
          configMap:
            name: k6-scripts
      restartPolicy: Never
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-ticket-open
  namespace: ticket-system
  labels:
    app: k6-load-test
    test: ticket-open
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: core-api
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: k6
          image: grafana/k6:latest
          args:
            - run
            - -e
            - BASE_URL=http://core-api:8000
            - -e
            - PEAK_VUS=200
            - -e
            - PRE_VUS=50
            - /scripts/ticket-open-scenario.js
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: "1"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: scripts
          configMap:
            name: k6-scripts
      restartPolicy: Never
