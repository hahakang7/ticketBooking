apiVersion: v1
kind: Service
metadata:
  name: websocket-service
  namespace: ticket-system
  labels:
    app: websocket-service
    tier: realtime
spec:
  type: LoadBalancer
  selector:
    app: websocket-service
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
  sessionAffinity: None