apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-service
  namespace: ticket-system
  labels:
    app: websocket-service
    tier: realtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-service
  template:
    metadata:
      labels:
        app: websocket-service
        tier: realtime
    spec:
      containers:
      - name: websocket
        image: ticketbooking-websocket-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "development"
        - name: PORT
          value: "3000"
        - name: HOST
          value: "0.0.0.0"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          value: ""
        - name: CORS_ORIGIN
          value: "http://localhost:3001"
        - name: API_BASE_URL
          value: "http://core-api:8000"
        - name: LOG_LEVEL
          value: "info"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: SECRET_KEY
        - name: INTERNAL_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INTERNAL_SECRET
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - websocket-service
              topologyKey: kubernetes.io/hostname