apiVersion: v1
kind: ServiceAccount
metadata:
  name: core-api
  namespace: ticket-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: core-api-prescaler
  namespace: ticket-system
rules:
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: core-api-prescaler
  namespace: ticket-system
subjects:
  - kind: ServiceAccount
    name: core-api
    namespace: ticket-system
roleRef:
  kind: Role
  name: core-api-prescaler
  apiGroup: rbac.authorization.k8s.io
