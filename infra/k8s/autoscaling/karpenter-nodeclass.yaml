apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: ticket-system-nodeclass
spec:
  # AL2023 AMI 사용 (최신 보안 패치 자동 적용)
  amiFamily: AL2023

  # Karpenter가 생성하는 노드에 부여할 IAM Role
  # setup.sh에서 생성된 KarpenterNodeRole 사용
  role: "KarpenterNodeRole-ticket-booking"

  # karpenter.sh/discovery 태그로 서브넷 자동 검색
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: ticket-booking

  # karpenter.sh/discovery 태그로 보안그룹 자동 검색
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: ticket-booking

  # 최신 AL2023 AMI 자동 선택
  amiSelectorTerms:
    - alias: al2023@latest

  # 루트 볼륨 설정
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        encrypted: true
        deleteOnTermination: true

  # 노드에 추가할 태그
  tags:
    project: ticket-booking
    environment: production
    managed-by: karpenter

  # 사용자 데이터 (필요 시 커스텀 설정 추가)
  # userData: |
  #   #!/bin/bash
  #   /etc/eks/bootstrap.sh ticket-booking
