apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "/etc/prometheus/alert-rules.yaml"

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      # core-api, websocket-service, redis-exporter 수집은
      # infra/prometheus/service-monitor.yaml의 ServiceMonitor로 이관됨

      - job_name: "kubernetes-nodes"
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

  alert-rules.yaml: |
    # (이전과 동일한 알람 규칙 내용 생략 - 기존에 작성된 alert-rules 코드 그대로 유지하시면 됩니다)