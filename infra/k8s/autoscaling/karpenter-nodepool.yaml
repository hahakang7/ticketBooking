apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: ticket-system-pool
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - "c5.large"
            - "c5.xlarge"
            - "c6i.large"
            - "c6i.xlarge"
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
  limits:
    cpu: "1000"
    memory: "1000Gi"
  disruption:
    consolidateAfter: 30s
    expireAfter: 2592000s
    budgets:
      - nodes: "10%"
        duration: 5m
  weight: 100
