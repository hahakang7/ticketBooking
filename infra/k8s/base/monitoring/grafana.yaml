apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: ticket-system
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: ticket-booking-prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: ticket-system
data:
  dashboard.yaml: |
    apiVersion: 1
    providers:
      - name: ticket-booking
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
