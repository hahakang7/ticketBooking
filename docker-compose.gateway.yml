version: '3.8'

services:
  # WebSocket Service (Node.js + Socket.IO) - 팀원 3 소유
  websocket-service:
    build:
      context: ./apps/websocket-service
      dockerfile: Dockerfile
    container_name: distribute-sys-websocket
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NODE_ENV: "development"
      REDIS_URL: redis://redis:6379
      CORE_API_URL: http://core-api:8000
      LOG_LEVEL: "info"
    depends_on:
      redis:
        condition: service_healthy
      core-api:
        condition: service_started
    volumes:
      - ./apps/websocket-service/src:/app/src
    command: npm run dev
    networks:
      - distribute-sys-network

  # Frontend (React + Vite) - 팀원 3 소유
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: distribute-sys-frontend
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:3000
      VITE_ENV: development
    depends_on:
      - core-api
      - websocket-service
    volumes:
      - ./apps/frontend/src:/app/src
      - ./apps/frontend/public:/app/public
    networks:
      - distribute-sys-network

networks:
  distribute-sys-network:
    external: true
