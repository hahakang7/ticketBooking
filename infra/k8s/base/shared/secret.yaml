apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  # Database 시크릿
  POSTGRES_USER: user
  POSTGRES_PASSWORD: password

  # JWT 시크릿
  SECRET_KEY: "your-secret-key-for-local-development-change-in-production"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_HOURS: "24"

  # 기타 민감 정보
  API_KEY: "your-api-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
type: Opaque
stringData:
  password: "redis-password-change-in-prod"
